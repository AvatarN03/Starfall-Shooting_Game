<svg width="480" height="180" viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg">
  <title>Starfall</title>
  <desc>Starfall space invaders game logo: a stylized spaceship-star mark with a wordmark.</desc>

  <!-- Icon: spaceship nose forming an S-shaped falling star trail -->
  <g transform="translate(20, 20)">
    <!-- trailing comet tail -->
    <path d="M 118 10
             C 70 10, 30 35, 30 68
             C 30 96, 55 112, 88 112
             C 112 112, 128 122, 128 140
             C 128 158, 108 168, 82 168"
          fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" opacity="0.55"/>

    <!-- spaceship body (nose cone pointing up-left along the trail) -->
    <g transform="translate(96, 6) rotate(35)">
      <path d="M 0 -34 C 14 -20, 18 6, 12 30 L -12 30 C -18 6, -14 -20, 0 -34 Z"
            fill="#09090b"/>
      <path d="M -12 30 L -22 46 L -8 38 Z" fill="#f59e0b"/>
      <path d="M 12 30 L 22 46 L 8 38 Z" fill="#f59e0b"/>
      <circle cx="0" cy="-4" r="6" fill="#ffffff"/>
    </g>

    <!-- sparkle stars -->
    <g fill="#ffffff">
      <path d="M 140 30 L 143 38 L 151 41 L 143 44 L 140 52 L 137 44 L 129 41 L 137 38 Z"/>
      <path d="M 100 145 L 102 150 L 107 152 L 102 154 L 100 159 L 98 154 L 93 152 L 98 150 Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="180" y="105" font-family="'Baloo 2', 'Comic Sans MS', sans-serif"
        font-size="52" font-weight="700" fill="#09090b">Starfall</text>
  <text x="181" y="130" font-family="'Baloo 2', 'Comic Sans MS', sans-serif"
        font-size="16" font-weight="500" fill="#f59e0b" letter-spacing="4">SPACE INVADERS</text>
</svg>
