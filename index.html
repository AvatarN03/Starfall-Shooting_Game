<!DOCTYPE html>
<html lang="en">

<head>
    <title>Starfall - Space invaders</title>
    <meta name="description"
        content="A modern arcade-inspired space shooter where players battle relentless alien waves, dodge enemy fire, and defend the galaxy with fast-paced gameplay.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="public/logo-cropped.jpg">
    <link href="index.css" rel="stylesheet">
</head>

<body>
    <p id="score-bar">SCORE: <span id="score">0</span></p>
    <canvas></canvas>

    <div class="glow-wrapper">
        <div class="glow-border"></div>
        <div class="show">
            <img class="mascot" src="public/invader.png" alt="" />
            <h1 id="game-over">Game Over</h1>
            <p id="final-score">Score: <span id="final-score-value">0</span></p>
            <button onclick="handleStart()">start game</button>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
